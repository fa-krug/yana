name: Yana

options:
  bundleIdPrefix: de.fa-krug
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - de
    - Base
  fileTypes:
    icon:
      file: true

settings:
  base:
    SWIFT_VERSION: "6"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: HS26J3YA63
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Sascha Krug. All rights reserved."
    VERSIONING_SYSTEM: apple-generic
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
  configs:
    Release:
      ENABLE_TESTABILITY: false

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.5"

targets:
  Yana:
    type: application
    platform: iOS
    sources:
      - path: Yana
        excludes:
          - "Info-iOS.plist"
    dependencies:
      - package: SwiftSoup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.fa-krug.Yana
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: Yana/Entitlements/Yana-iOS.entitlements
        INFOPLIST_FILE: Yana/Info-iOS.plist
        GENERATE_INFOPLIST_FILE: false
        # 1,2 = iPhone/iPad; 6 = Mac. Family 6 opts the Mac Catalyst build into the
        # native Mac idiom ("Optimize Interface for Mac") instead of the scaled-iPad
        # idiom. iOS ignores 6, so the iPhone/iPad build stays a universal 1,2 app.
        TARGETED_DEVICE_FAMILY: "1,2,6"
        # Ship a real Mac app via Mac Catalyst (not the "Designed for iPad" runtime).
        # The Mac build mirrors the iOS 26 deployment target -> macOS 26. Keeping the same
        # PRODUCT_BUNDLE_IDENTIFIER across platforms (DERIVE = NO) means the Mac build shares the
        # iCloud.de.fa-krug.Yana CloudKit container + Keychain, so ConfigSyncService syncs config
        # iPhone <-> Mac with no extra code. macOS-only entitlements (App Sandbox, network client,
        # user-selected files) live in the shared entitlements file and are ignored on iOS.
        SUPPORTS_MACCATALYST: true
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.news
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Yana uses Face ID to protect your reading data."
      configs:
        # APNs environment for the Push Notifications capability (aps-environment
        # entitlement). Required for CloudKit's CKDatabaseSubscription silent pushes
        # to wake the app and pull config changes across devices. Debug builds use the
        # development APNs sandbox; archived/TestFlight/App Store builds use production.
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production

  YanaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: YanaTests
    dependencies:
      - target: Yana
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.fa-krug.Yana.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Yana.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Yana"
        BUNDLE_LOADER: "$(TEST_HOST)"

  YanaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: YanaUITests
    dependencies:
      - target: Yana
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.fa-krug.Yana.uitests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Yana:
    build:
      targets:
        Yana: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - YanaTests
        - YanaUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
